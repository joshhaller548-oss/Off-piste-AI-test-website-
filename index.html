<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Off Piste AI — AI systems that pay back from day one</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>:root{
  --bg: #0b0b0c;
  --bg-elev: #141416;
  --bg-elev-2: #1c1c20;
  --ink: #f5f1ea;
  --ink-dim: #a6a29a;
  --ink-faint: #6b6861;
  --line: rgba(245,241,234,0.09);
  --line-strong: rgba(245,241,234,0.18);
  --accent: #e38b6b;       /* warm terracotta from brand */
  --accent-soft: #f2b79a;
  --accent-ink: #1a0f0a;
  --good: #8fc39a;
  --warn: #e6b365;
  --bad: #d97a7a;
  --radius: 14px;
  --radius-lg: 20px;
  --maxw: 1240px;
  --pad: clamp(20px, 4vw, 48px);
}

*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{overflow-x:hidden}

a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}

/* Typography */
.serif{font-family:'Instrument Serif',serif;font-weight:400;letter-spacing:-0.01em}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:400}

.eyebrow{
  font-family:'JetBrains Mono',ui-monospace,monospace;
  font-size:11px; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--ink-dim); display:inline-flex; align-items:center; gap:10px;
}
.eyebrow::before{content:""; width:18px; height:1px; background:var(--accent)}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; gap:10px;
  padding:14px 22px; border-radius:999px; font-size:14px; font-weight:500;
  transition:transform .15s ease, background .2s ease, color .2s ease;
}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--ink); color:#0b0b0c}
.btn-primary:hover{background:var(--accent); color:var(--accent-ink)}
.btn-ghost{color:var(--ink)}
.btn-ghost:hover{color:var(--accent)}
.btn-accent{background:var(--accent); color:var(--accent-ink)}
.btn-accent:hover{background:var(--accent-soft)}

/* Layout */
.wrap{max-width:var(--maxw); margin:0 auto; padding:0 var(--pad)}
section{position:relative}

/* Noise / grain overlay */
.grain{
  position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.035; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
}

/* Nav */
.nav{
  position:sticky; top:0; z-index:50;
  backdrop-filter:blur(16px);
  background:rgba(11,11,12,0.7);
  border-bottom:1px solid var(--line);
}
.nav-inner{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 0; gap:32px;
}
.brand{display:flex; align-items:center; gap:10px; font-size:17px; letter-spacing:-0.01em}
.brand-mark{
  width:26px; height:26px; display:grid; place-items:center;
}
.nav-links{display:flex; gap:28px; font-size:14px; color:var(--ink-dim)}
.nav-links a{transition:color .2s}
.nav-links a:hover{color:var(--ink)}
.nav-cta{display:flex; gap:12px; align-items:center}

/* Hero */
.hero{padding:72px 0 48px; position:relative; overflow:hidden}
.hero-grid{
  display:grid; grid-template-columns: 1.05fr 1fr; gap:64px; align-items:center;
}
.hero h1{
  font-family:'Instrument Serif',serif; font-weight:400;
  font-size: clamp(52px, 7.2vw, 112px);
  line-height: 0.95; letter-spacing:-0.02em; margin:24px 0 24px;
}
.hero h1 em{font-style:italic; color:var(--accent)}
.hero p.lead{font-size:17px; color:var(--ink-dim); max-width:520px; line-height:1.6; margin:0 0 36px}
.hero-ctas{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
.hero-meta{
  margin-top:56px; display:flex; gap:40px; border-top:1px solid var(--line); padding-top:28px;
  color:var(--ink-dim); font-size:12px;
}
.hero-meta .k{font-family:'Instrument Serif',serif; font-size:28px; color:var(--ink); display:block; line-height:1}
.hero-meta .l{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; margin-top:8px; display:block}

/* Hero dashboard mock */
.dash{
  position:relative; aspect-ratio: 1 / 1.05;
  background:linear-gradient(180deg, #1a1512 0%, #14100e 100%);
  border:1px solid var(--line-strong);
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow: 0 40px 100px -30px rgba(227,139,107,0.25), 0 10px 30px rgba(0,0,0,0.5);
}
.dash-chrome{
  display:flex; align-items:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--line);
  background:rgba(0,0,0,0.25);
}
.dash-dot{width:10px; height:10px; border-radius:50%;}
.dash-title{margin-left:auto; margin-right:auto; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.16em; color:var(--ink-dim)}
.dash-body{padding:20px; display:grid; gap:16px; grid-template-rows:auto auto 1fr}
.kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
.kpi{
  border:1px solid var(--line); border-radius:12px; padding:14px;
  background:rgba(227,139,107,0.04);
}
.kpi .n{font-family:'Instrument Serif',serif; font-size:34px; line-height:1; color:var(--ink)}
.kpi .l{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); margin-top:8px; display:block}
.kpi .d{font-size:11px; color:var(--accent); margin-top:6px; font-family:'JetBrains Mono',monospace}

.spark{
  display:flex; align-items:end; gap:6px; height:70px; padding:10px 0;
  border-top:1px solid var(--line); border-bottom:1px solid var(--line);
}
.spark-label{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.14em; color:var(--ink-dim); text-transform:uppercase; margin-bottom:8px; display:flex; justify-content:space-between}
.spark-bar{flex:1; background:linear-gradient(180deg,var(--accent),rgba(227,139,107,0.3)); border-radius:3px; min-height:6px; transition:height 1.2s cubic-bezier(.2,.8,.2,1)}
.spark-tick{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--ink-faint); display:flex; justify-content:space-between; margin-top:4px}

.feed{display:flex; flex-direction:column; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px}
.feed-row{display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-radius:8px; background:rgba(255,255,255,0.02); border:1px solid var(--line);}
.feed-row .l{display:flex; gap:8px; align-items:center; color:var(--ink)}
.feed-row .r{color:var(--ink-faint)}
.pulse{width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 0 var(--accent); animation:pulse 1.6s infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(227,139,107,0.6)}
  70%{box-shadow:0 0 0 8px rgba(227,139,107,0)}
  100%{box-shadow:0 0 0 0 rgba(227,139,107,0)}
}

/* Floating card on hero */
.float-card{
  position:absolute; background:var(--bg-elev);
  border:1px solid var(--line-strong); border-radius:12px; padding:14px 16px;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  font-family:'JetBrains Mono',monospace; font-size:11px;
}
.float-card .big{font-family:'Instrument Serif',serif; font-size:28px; color:var(--accent); line-height:1; margin-top:4px}
.float-tl{ top:-14px; right:-18px; }
.float-bl{ bottom:22px; left:-22px; background:#f5f1ea; color:#1a0f0a; border-color:transparent }
.float-bl .big{color:#b95f3e}

/* Section common */
.section{padding:clamp(80px,10vw,140px) 0}
.section-head{display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-bottom:56px; align-items:end}
.section-head h2{
  font-family:'Instrument Serif',serif; font-weight:400;
  font-size:clamp(40px, 6vw, 76px); line-height:1; letter-spacing:-0.015em; margin:14px 0 0;
}
.section-head h2 em{font-style:italic; color:var(--accent)}
.section-head p{color:var(--ink-dim); max-width:460px; margin:0; font-size:16px; line-height:1.55; justify-self:end;}

/* Voice Agent section */
.voice{
  background:linear-gradient(180deg, #0b0b0c 0%, #0e0e10 100%);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.voice-grid{
  display:grid; grid-template-columns: 1fr 1.1fr; gap:80px; align-items:center;
}
.phone{
  aspect-ratio: 0.5 / 1; max-width:320px; margin:0 auto;
  background:#000; border:1px solid var(--line-strong); border-radius:40px; padding:16px;
  position:relative; box-shadow:0 40px 80px -10px rgba(0,0,0,.6);
}
.phone-screen{
  background:linear-gradient(180deg,#1b2235 0%, #0c1120 100%);
  border-radius:28px; height:100%; padding:18px 14px; display:flex; flex-direction:column;
}
.phone-status{display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; color:#cfd3dc; margin-bottom:14px}
.call-card{
  background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:16px; margin-top:auto; margin-bottom:16px;
}
.call-head{display:flex; align-items:center; gap:8px; color:#cfd3dc; font-size:11px; font-family:'JetBrains Mono',monospace; margin-bottom:16px}
.wave{display:inline-flex; gap:2px; align-items:center}
.wave span{width:2px; background:var(--accent); border-radius:2px; animation:wave 1s infinite ease-in-out}
.wave span:nth-child(2){animation-delay:.1s}
.wave span:nth-child(3){animation-delay:.2s}
.wave span:nth-child(4){animation-delay:.3s}
.wave span:nth-child(5){animation-delay:.4s}
@keyframes wave{0%,100%{height:4px}50%{height:14px}}

.msg{padding:10px 0; border-top:1px solid rgba(255,255,255,0.06)}
.msg .who{font-family:'JetBrains Mono',monospace; font-size:10px; color:#8a92a3; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; display:flex; align-items:center; gap:6px}
.who .tri{width:0; height:0; border-left:5px solid var(--accent); border-top:3px solid transparent; border-bottom:3px solid transparent}
.msg .t{color:#e9ecf3; font-size:13px; line-height:1.4}
.msg.typing .t::after{content:"▋"; color:var(--accent); animation:blink 1s steps(1) infinite; margin-left:2px}
@keyframes blink{50%{opacity:0}}

.phone-end{display:flex; justify-content:center; margin-top:auto}
.end-btn{width:44px; height:44px; border-radius:50%; background:#d74646; display:grid; place-items:center; color:white}

.voice-copy h3{font-family:'Instrument Serif',serif; font-size:clamp(36px,4.6vw,56px); line-height:1.02; margin:14px 0 20px; font-weight:400; letter-spacing:-0.015em}
.voice-copy h3 em{font-style:italic; color:var(--accent)}
.voice-copy p{color:var(--ink-dim); font-size:16px; max-width:480px; line-height:1.6; margin:0 0 28px}
.voice-stats{display:grid; grid-template-columns:repeat(3,auto); gap:36px; margin-top:32px; border-top:1px solid var(--line); padding-top:24px}
.voice-stat .n{font-family:'Instrument Serif',serif; font-size:40px; line-height:1; color:var(--ink)}
.voice-stat .l{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); margin-top:6px}

/* Process */
.process-steps{display:grid; grid-template-columns:repeat(3,1fr); gap:28px; margin-top:24px}
.step{
  border:1px solid var(--line); border-radius:var(--radius); padding:28px;
  background:rgba(255,255,255,0.015); position:relative; overflow:hidden;
  transition:border-color .3s;
}
.step:hover{border-color:var(--accent)}
.step .num{font-family:'Instrument Serif',serif; font-style:italic; color:var(--accent); font-size:48px; line-height:1}
.step h4{font-family:'Instrument Serif',serif; font-weight:400; font-size:24px; margin:24px 0 10px; letter-spacing:-0.01em}
.step p{color:var(--ink-dim); font-size:14px; line-height:1.55; margin:0}
.step-icon{
  position:absolute; top:24px; right:24px;
  width:36px; height:36px; border-radius:8px; border:1px solid var(--line);
  display:grid; place-items:center; color:var(--accent);
}

/* Services */
.services-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
.service{
  padding:40px 32px; background:var(--bg); position:relative;
  min-height:260px; display:flex; flex-direction:column;
  transition:background .25s;
}
.service:hover{background:#121113}
.service:hover .svc-viz{opacity:1; transform:translateY(0)}
.service .svc-ic{
  width:40px; height:40px; border-radius:10px; border:1px solid var(--line-strong);
  display:grid; place-items:center; color:var(--accent); margin-bottom:28px;
  background:rgba(227,139,107,0.06);
}
.service h5{font-family:'Instrument Serif',serif; font-weight:400; font-size:22px; margin:0 0 10px; letter-spacing:-0.01em}
.service p{color:var(--ink-dim); font-size:13.5px; line-height:1.55; margin:0 0 16px}
.svc-meta{margin-top:auto; display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); letter-spacing:0.1em; text-transform:uppercase}
.svc-meta .arrow{color:var(--accent); opacity:0; transform:translateX(-6px); transition:all .2s}
.service:hover .arrow{opacity:1; transform:translateX(0)}

/* Industries switcher */
.industries{
  display:grid; grid-template-columns: 320px 1fr; gap:0; border:1px solid var(--line);
  border-radius:var(--radius-lg); overflow:hidden; min-height:460px;
}
.ind-tabs{display:flex; flex-direction:column; border-right:1px solid var(--line); background:rgba(255,255,255,0.015)}
.ind-tab{
  padding:20px 24px; text-align:left; border-bottom:1px solid var(--line);
  font-size:15px; color:var(--ink-dim); font-family:'Inter',sans-serif; font-weight:500;
  display:flex; justify-content:space-between; align-items:center; transition:all .2s;
}
.ind-tab:last-child{border-bottom:none}
.ind-tab .idx{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint); letter-spacing:0.14em}
.ind-tab:hover{color:var(--ink); background:rgba(255,255,255,0.02)}
.ind-tab.active{color:var(--ink); background:rgba(227,139,107,0.08)}
.ind-tab.active .idx{color:var(--accent)}

.ind-panel{padding:48px; display:flex; flex-direction:column; gap:24px; position:relative}
.ind-panel h4{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(32px,4vw,44px); letter-spacing:-0.015em; line-height:1.05; margin:0}
.ind-panel h4 em{font-style:italic; color:var(--accent)}
.ind-panel p{color:var(--ink-dim); font-size:15px; line-height:1.6; max-width:500px; margin:0}
.ind-list{display:grid; gap:10px; margin-top:12px}
.ind-list li{
  list-style:none; font-size:13px; color:var(--ink); display:flex; gap:12px; align-items:center;
  padding:10px 14px; border:1px solid var(--line); border-radius:8px; background:rgba(255,255,255,0.02);
  font-family:'JetBrains Mono',monospace;
}
.ind-list li .dot{width:6px; height:6px; border-radius:50%; background:var(--accent)}
.ind-roi{
  margin-top:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding-top:20px; border-top:1px solid var(--line)
}
.ind-roi .n{font-family:'Instrument Serif',serif; font-size:32px; line-height:1}
.ind-roi .n em{font-style:italic; color:var(--accent)}
.ind-roi .l{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); margin-top:6px}

/* Stats */
.stats{background:var(--bg-elev); border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
.stats-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:0}
.stat{padding:48px 32px; border-right:1px solid var(--line)}
.stat:last-child{border-right:none}
.stat .n{font-family:'Instrument Serif',serif; font-size:clamp(44px,5.4vw,72px); line-height:1; letter-spacing:-0.02em}
.stat .n em{font-style:italic; color:var(--accent)}
.stat .l{color:var(--ink-dim); font-size:14px; line-height:1.4; margin-top:16px; max-width:240px}

/* CTA */
.cta{padding:clamp(100px,14vw,180px) 0; text-align:center; position:relative; overflow:hidden}
.cta::before{
  content:""; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 60%, rgba(227,139,107,0.12) 0%, transparent 60%);
  pointer-events:none;
}
.cta h2{
  font-family:'Instrument Serif',serif; font-weight:400;
  font-size:clamp(52px,8vw,120px); line-height:0.95; letter-spacing:-0.02em;
  max-width:900px; margin:0 auto 28px;
}
.cta h2 em{font-style:italic; color:var(--accent)}
.cta p{color:var(--ink-dim); font-size:17px; max-width:560px; margin:0 auto 40px; line-height:1.55}

/* Footer */
footer{border-top:1px solid var(--line); padding:60px 0 40px; color:var(--ink-dim); font-size:13px}
.foot-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:40px; margin-bottom:48px}
.foot-grid h6{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 16px; font-weight:500}
.foot-grid ul{list-style:none; padding:0; margin:0; display:grid; gap:8px}
.foot-grid a:hover{color:var(--accent)}
.foot-bot{display:flex; justify-content:space-between; padding-top:24px; border-top:1px solid var(--line); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; color:var(--ink-faint)}

.foot-brand p{max-width:320px; line-height:1.6; margin-top:12px}

/* Booking modal */
.modal-scrim{position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:100; display:grid; place-items:center; padding:24px; animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg-elev); border:1px solid var(--line-strong); border-radius:var(--radius-lg);
  width:100%; max-width:520px; padding:40px; position:relative;
  animation:modalIn .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.modal .close{position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; display:grid; place-items:center; color:var(--ink-dim); border:1px solid var(--line)}
.modal .close:hover{color:var(--ink); background:rgba(255,255,255,0.04)}
.modal h3{font-family:'Instrument Serif',serif; font-weight:400; font-size:32px; margin:0 0 10px; letter-spacing:-0.01em}
.modal p.sub{color:var(--ink-dim); font-size:14px; margin:0 0 28px}
.field{display:block; margin-bottom:16px}
.field label{display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:8px}
.field input, .field select, .field textarea{
  width:100%; background:var(--bg); border:1px solid var(--line-strong); color:var(--ink);
  padding:14px 16px; border-radius:10px; font-family:inherit; font-size:14px;
  transition:border-color .2s;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent)}
.field .err{color:var(--bad); font-size:12px; margin-top:6px; font-family:'JetBrains Mono',monospace}
.modal-footer{display:flex; justify-content:space-between; align-items:center; margin-top:24px}
.modal-footer .step-dots{display:flex; gap:6px}
.step-dots span{width:6px; height:6px; border-radius:50%; background:var(--line-strong)}
.step-dots span.on{background:var(--accent)}
.success{display:grid; place-items:center; padding:24px 0; text-align:center; gap:14px}
.success .tick{width:60px; height:60px; border-radius:50%; background:var(--accent); display:grid; place-items:center; color:var(--accent-ink)}

/* Tweaks panel */
.tweaks{
  position:fixed; right:20px; bottom:20px; z-index:60;
  background:var(--bg-elev); border:1px solid var(--line-strong); border-radius:14px;
  padding:18px; width:260px; box-shadow:0 20px 50px rgba(0,0,0,.5);
  font-size:13px;
}
.tweaks h6{margin:0 0 12px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-dim); font-weight:500}

// Reveal on scroll hook
function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.08 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
}

// Count up animation hook
function useCountUp(target, trigger, duration = 1400) {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    if (!trigger) return;
    let raf, start;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min((t - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(Math.round(target * eased));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, trigger]);
  return v;
}

// components/BookingModal.jsx
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DNAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const TIMES = ['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM',
               '1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM'];

const BookingModal = ({ open, onClose }) => {
  const now = new Date();
  const [vYear, setVYear] = React.useState(now.getFullYear());
  const [vMonth, setVMonth] = React.useState(now.getMonth());
  const [selDate, setSelDate] = React.useState(null);
  const [selTime, setSelTime] = React.useState(null);
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [done, setDone] = React.useState(false);
  const [err, setErr] = React.useState('');

  React.useEffect(() => {
    if (open) {
      const n = new Date();
      setVYear(n.getFullYear()); setVMonth(n.getMonth());
      setSelDate(null); setSelTime(null); setName(''); setEmail(''); setDone(false); setErr('');
    }
    const esc = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, [open]);

  if (!open) return null;

  const prevMonth = () => { if (vMonth === 0) { setVMonth(11); setVYear(y => y-1); } else setVMonth(m => m-1); };
  const nextMonth = () => { if (vMonth === 11) { setVMonth(0); setVYear(y => y+1); } else setVMonth(m => m+1); };

  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const firstDay = new Date(vYear, vMonth, 1).getDay();
  const daysInMonth = new Date(vYear, vMonth + 1, 0).getDate();
  const isPrevDisabled = vYear === now.getFullYear() && vMonth === now.getMonth();

  const calCells = [];
  for (let i = 0; i < firstDay; i++) calCells.push(null);
  for (let d = 1; d <= daysInMonth; d++) calCells.push(d);

  const [sending, setSending] = React.useState(false);

  const submit = async () => {
    if (!name.trim() || !email.trim()) { setErr('Please enter your name and email.'); return; }
    if (!/^\S+@\S+\.\S+$/.test(email)) { setErr('Please enter a valid email.'); return; }
    setErr('');
    setSending(true);

    const dateStr = new Date(selDate.y, selDate.m, selDate.d)
      .toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    const templateParams = {
      client_name:  name,
      client_email: email,
      booking_date: dateStr,
      booking_time: selTime,
      meet_link:    'https://meet.google.com/zkg-poit-gvc',
      to_email:     email,
      reply_to:     'Hello@offpisteai.com',
    };

    try {
      if (window.__emailjsReady) {
        await emailjs.send(
          window.EMAILJS_SERVICE_ID,
          window.EMAILJS_TEMPLATE_ID,
          templateParams
        );
      }
    } catch (e) {
      console.error('EmailJS error:', e);
    }

    setSending(false);
    setDone(true);
  };

  const selectedLabel = selDate
    ? new Date(selDate.y, selDate.m, selDate.d).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })
    : null;

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" style={{maxWidth:600,padding:0,overflow:'hidden'}} onClick={e => e.stopPropagation()}>
        <button className="close" style={{top:16,right:16,zIndex:2}} onClick={onClose}><Icon name="close" size={14}/></button>

        {done ? (
          <div className="success" style={{padding:'48px 40px'}}>
            <div className="tick"><Icon name="check" size={22}/></div>
            <h3 style={{margin:'8px 0 4px'}}>You're booked.</h3>
            <p className="sub" style={{margin:0}}>Confirmation sent to your email with the Google Meet link. We'll see you then.</p>
          </div>
        ) : (
          <div style={{display:'grid', gridTemplateColumns:'200px 1fr'}}>
            {/* Sidebar */}
            <div style={{background:'rgba(255,255,255,0.03)',borderRight:'1px solid var(--line)',padding:'32px 24px',display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <LogoMark size={22}/>
                <div style={{fontFamily:'JetBrains Mono',fontSize:9,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--ink-faint)',marginTop:10}}>offpiste AI</div>
              </div>
              <div style={{fontFamily:'Instrument Serif',fontSize:22,lineHeight:1.1,marginTop:4}}>Book a<br/><em style={{color:'var(--accent)',fontStyle:'italic'}}>consultation</em></div>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:8}}>
                {[
                  ['calendar','30 minutes'],
                  ['phone','Google Meet'],
                  ['spark','London (GMT/BST)'],
                ].map(([icon, label]) => (
                  <div key={label} style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--ink-dim)'}}>
                    <Icon name={icon} size={13}/>{label}
                  </div>
                ))}
              </div>
            </div>

            {/* Main */}
            <div style={{padding:'28px 28px 28px'}}>
              {!selDate ? (
                <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                    <span style={{fontFamily:'Instrument Serif',fontSize:18}}>{MONTHS[vMonth]} {vYear}</span>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={prevMonth} disabled={isPrevDisabled} className="btn btn-ghost" style={{padding:'6px 10px',opacity:isPrevDisabled?0.25:1}}>‹</button>
                      <button onClick={nextMonth} className="btn btn-ghost" style={{padding:'6px 10px'}}>›</button>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
                    {DNAMES.map(d => <div key={d} style={{textAlign:'center',fontSize:10,fontFamily:'JetBrains Mono',color:'var(--ink-faint)',paddingBottom:6,letterSpacing:'0.1em'}}>{d}</div>)}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
                    {calCells.map((d, i) => {
                      if (!d) return <div key={`e${i}`}/>;
                      const dt = new Date(vYear, vMonth, d);
                      const past = dt < todayMidnight;
                      const weekend = dt.getDay() === 0 || dt.getDay() === 6;
                      const isToday = dt.getTime() === todayMidnight.getTime();
                      const isSel = selDate && selDate.y === vYear && selDate.m === vMonth && selDate.d === d;
                      const disabled = past || weekend;
                      return (
                        <button key={d} disabled={disabled} onClick={() => { setSelDate({y:vYear,m:vMonth,d}); setSelTime(null); }}
                          style={{
                            aspectRatio:'1',border:'none',borderRadius:8,fontSize:13,cursor:disabled?'not-allowed':'pointer',
                            background: isSel ? 'var(--accent)' : isToday ? 'rgba(227,139,107,0.15)' : 'transparent',
                            color: isSel ? 'var(--accent-ink)' : disabled ? 'var(--ink-faint)' : isToday ? 'var(--accent)' : 'var(--ink)',
                            fontWeight: isToday||isSel ? 700 : 400,
                            transition:'background .15s',
                          }}
                          onMouseEnter={e => { if(!disabled&&!isSel) e.currentTarget.style.background='rgba(255,255,255,0.06)'; }}
                          onMouseLeave={e => { if(!isSel) e.currentTarget.style.background=isToday?'rgba(227,139,107,0.15)':'transparent'; }}
                        >{d}</button>
                      );
                    })}
                  </div>
                </>
              ) : !selTime ? (
                <>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
                    <button onClick={() => setSelDate(null)} className="btn btn-ghost" style={{padding:'4px 10px',fontSize:13}}>← Back</button>
                    <span style={{fontFamily:'Instrument Serif',fontSize:16}}>{selectedLabel}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {TIMES.map(t => (
                      <button key={t} onClick={() => setSelTime(t)}
                        style={{
                          padding:'10px',border:'1px solid var(--line-strong)',borderRadius:8,
                          fontSize:13,fontFamily:'JetBrains Mono',color:'var(--ink)',background:'transparent',cursor:'pointer',
                          transition:'all .15s',
                        }}
                        onMouseEnter={e => { e.currentTarget.style.background='rgba(227,139,107,0.1)'; e.currentTarget.style.borderColor='var(--accent)'; }}
                        onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.borderColor='var(--line-strong)'; }}
                      >{t}</button>
                    ))}
                  </div>
                </>
              ) : (
                <>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                    <button onClick={() => setSelTime(null)} className="btn btn-ghost" style={{padding:'4px 10px',fontSize:13}}>← Back</button>
                    <span style={{fontFamily:'Instrument Serif',fontSize:16}}>{selectedLabel}</span>
                  </div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:12,color:'var(--accent)',marginBottom:20}}>{selTime} · 30 min · Google Meet</div>
                  <div className="field">
                    <label>Full name</label>
                    <input value={name} onChange={e => setName(e.target.value)} placeholder="Jane Smith"/>
                  </div>
                  <div className="field">
                    <label>Email</label>
                    <input value={email} onChange={e => setEmail(e.target.value)} placeholder="jane@company.com"/>
                  </div>
                  {err && <div style={{color:'var(--bad)',fontSize:12,fontFamily:'JetBrains Mono',marginBottom:12}}>{err}</div>}
                  <button onClick={submit} disabled={sending} className="btn btn-accent" style={{width:'100%',justifyContent:'center',padding:'14px',opacity:sending?0.7:1}}>
                    {sending ? 'Sending…' : 'Confirm booking'} {!sending && <Icon name="arrow" size={14}/>}
                  </button>
                </>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};
window.BookingModal = BookingModal;

  if (!visible) return null;
  const palettes = [
    { name: 'Terracotta', val: '#e38b6b', soft: '#f2b79a' },
    { name: 'Rust', val: '#c5643f', soft: '#e69779' },
    { name: 'Amber', val: '#e6b365', soft: '#f3d199' },
    { name: 'Sage', val: '#9ab89a', soft: '#c5d6c5' },
    { name: 'Ink', val: '#7c8bcc', soft: '#a8b4dc' },
  ];
  return (
    <div className="tweaks">
      <h6>Tweaks</h6>
      <div className="tweak-row">
        <label>Accent</label>

          {palettes.map(p => (
            <div
              key={p.name}
              className={`swatch ${settings.accent === p.val ? 'on' : ''}`}
              style={{ background: p.val }}
              onClick={() => setSettings({ ...settings, accent: p.val, accentSoft: p.soft })}
              title={p.name}
            />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Light mode</label>
        <div className={`toggle ${settings.light ? 'on' : ''}`} onClick={() => setSettings({ ...settings, light: !settings.light })}/>
      </div>
      <div className="tweak-row">
        <label>Grain</label>
        <div className={`toggle ${settings.grain ? 'on' : ''}`} onClick={() => setSettings({ ...settings, grain: !settings.grain })}/>
      </div>
      <div className="tweak-row">
        <label>Motion</label>
        <div className={`toggle ${settings.motion ? 'on' : ''}`} onClick={() => setSettings({ ...settings, motion: !settings.motion })}/>
      </div>
    </div>
  );
};
window.Tweaks = Tweaks;


// app.jsx
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#c5643f",
  "accentSoft": "#e69779",
  "light": false,
  "grain": true,
  "motion": true
}/*EDITMODE-END*/;

function App() {
  const [bookOpen, setBookOpen] = React.useState(false);
  const [settings, setSettings] = React.useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  useReveal();

  // Apply tweaks live
  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', settings.accent);
    r.style.setProperty('--accent-soft', settings.accentSoft);
    if (settings.light) {
      r.style.setProperty('--bg', '#f5f1ea');
      r.style.setProperty('--bg-elev', '#ffffff');
      r.style.setProperty('--bg-elev-2', '#ebe6de');
      r.style.setProperty('--ink', '#1a1512');
      r.style.setProperty('--ink-dim', '#6b6861');
      r.style.setProperty('--ink-faint', '#a6a29a');
      r.style.setProperty('--line', 'rgba(26,21,18,0.09)');
      r.style.setProperty('--line-strong', 'rgba(26,21,18,0.18)');
    } else {
      r.style.setProperty('--bg', '#0b0b0c');
      r.style.setProperty('--bg-elev', '#141416');
      r.style.setProperty('--bg-elev-2', '#1c1c20');
      r.style.setProperty('--ink', '#f5f1ea');
      r.style.setProperty('--ink-dim', '#a6a29a');
      r.style.setProperty('--ink-faint', '#6b6861');
      r.style.setProperty('--line', 'rgba(245,241,234,0.09)');
      r.style.setProperty('--line-strong', 'rgba(245,241,234,0.18)');
    }
  }, [settings]);

  // Edit mode protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Persist tweak edits
  const updateSettings = (next) => {
    setSettings(next);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*'); } catch {}
  };

  return (
    <>
      {settings.grain && <div className="grain"/>}
      <Nav onBook={() => setBookOpen(true)}/>
      <Hero onBook={() => setBookOpen(true)}/>
      <VoiceAgent/>
      <Process/>
      <Services/>
      <Industries/>
      <Stats/>
      <CTA onBook={() => setBookOpen(true)}/>
      <Footer/>
      <BookingModal open={bookOpen} onClose={() => setBookOpen(false)}/>
      <Tweaks settings={settings} setSettings={updateSettings} visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script></body></html>
